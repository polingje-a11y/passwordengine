<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0d13">
  <title>PasswordEngine — Authenticating...</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0b0d13;
      color: #f3f4f6;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(59, 132, 246, 0.08) 0%, transparent 40%);
    }

    .callback-container {
      text-align: center;
      max-width: 360px;
      padding: 40px 24px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(139, 92, 246, 0.2);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .callback-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .callback-desc {
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.5;
    }

    .callback-error {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-top: 24px;
    }

    .callback-error.show {
      display: block;
    }

    .error-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .error-message {
      font-size: 14px;
      color: #fca5a5;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
      border: none;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      text-decoration: none;
    }

    .btn-retry:hover {
      opacity: 0.9;
    }

    .btn-retry:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div class="callback-container">
    <div id="loading-state">
      <div class="spinner"></div>
      <h1 class="callback-title">Authenticating...</h1>
      <p class="callback-desc">Completing your sign-in with WordPress. Just a moment.</p>
    </div>

    <div id="error-state" class="callback-error">
      <div class="error-icon">⚠️</div>
      <h2 class="callback-title">Authentication Failed</h2>
      <p id="error-message" class="error-message">An unknown error occurred.</p>
      <a href="./" class="btn-retry">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 1 2.64 6.36"/>
          <path d="M3 22v-6h6"/>
        </svg>
        Try Again
      </a>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    (async function handleOAuthCallback() {
      const loadingEl = document.getElementById('loading-state');
      const errorEl = document.getElementById('error-state');
      const errorMsgEl = document.getElementById('error-message');

      try {
        const queryString = window.location.search;

        if (!queryString || queryString.length < 2) {
          // No query params — redirect to main app
          window.location.replace('./');
          return;
        }

        const result = await AuthManager.handleCallback(queryString);

        if (result.success) {
          // Successfully authenticated — redirect to main app
          window.location.replace('./');
        } else {
          // Show error
          loadingEl.style.display = 'none';
          errorEl.classList.add('show');
          errorMsgEl.textContent = result.error || 'Authentication failed. Please try again.';
        }
      } catch (err) {
        console.error('Callback processing error:', err);
        loadingEl.style.display = 'none';
        errorEl.classList.add('show');
        errorMsgEl.textContent = 'An unexpected error occurred during authentication.';
      }
    })();
  </script>
</body>
</html>
